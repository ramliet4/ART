<link rel="stylesheet" href="{{url_for('static',filename='css/contact.css')}}">    

<div class="contact-outside">
     <div id="centre-outside">
        <div id="centre-inside">
            
            <div id="info-box">
                
            </div>

            <div id="input-box"> 
                <form>
                    <div id="name-box">
                        <div id="first-name-input">
                            <label for="first-name-input">First Name:</label>
                            <input type="text" id="first-name-input" name="first-name" class="form-input" placeholder="First Name" required/>
                        </div>

                        <div id="last-name-input">
                            <label for="last-name-input">Last Name:</label>
                            <input type="text" id="last-name-input" name="last-name" class="form-input" placeholder="Last Name" required/>
                        </div>
                    </div>
                    
                    <div id="email-input">
                        <label for="email-input">Email Address:</label>
                        <input type="text" id="email-input" name="email" class="form-input" placeholder="Email Address" required/>
                    </div>

                    <div id="message-input">
                        <label for="message">Message:</label>
                        <textarea id="message-box" id="message-input" name="message" placeholder="Message"></textarea> 
                    </div>

                    <input type="submit" name="submit-button" class="submit-button" value="Submit"/>
                </form>
            </div>

        </div>
    </div>
</div>
